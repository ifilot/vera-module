<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VERA fork placement sites</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: Canvas; color: CanvasText; }
    main { width: min(680px, calc(100vw - 40px)); }
    h1 { font-size: clamp(2rem, 7vw, 4rem); line-height: 1; margin: 0 0 1.5rem; letter-spacing: 0; }
    ul { display: grid; gap: 0.75rem; padding: 0; margin: 0; list-style: none; }
    a { display: flex; justify-content: space-between; gap: 1rem; padding: 1rem; border: 1px solid color-mix(in srgb, CanvasText 22%, transparent); border-radius: 8px; color: inherit; text-decoration: none; }
    a:hover, a:focus-visible { border-color: CanvasText; outline: none; }
    span { opacity: 0.68; }
  </style>
</head>
<body>
  <main>
    <h1>Placement</h1>
    <ul>
      <li><a href="fork-r0/"><strong>fork-r0</strong><span>pcb/fork-r0/fork-r0.kicad_pcb</span></a></li>
      <li><a href="fork-r1/"><strong>fork-r1</strong><span>pcb/fork-r1/fork-r1.kicad_pcb</span></a></li>
    </ul>
  </main>
</body>
</html>
